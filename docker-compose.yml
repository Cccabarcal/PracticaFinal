version: '3.9'

services:
  # Base de datos MySQL
  db:
    image: mysql:8.0
    container_name: eafit_db
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-password}
      MYSQL_DATABASE: ${DB_NAME:-usuarios}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - eafit_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Servidor Web - Versión en Inglés
  web-en:
    build: ./app-web
    container_name: eafit_web_en
    environment:
      DB_HOST: db
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-password}
      DB_NAME: ${DB_NAME:-usuarios}
      LANGUAGE: en
      FLASK_ENV: production
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./app-web:/app
    networks:
      - eafit_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Servidor Web - Versión en Español
  web-es:
    build: ./app-web
    container_name: eafit_web_es
    environment:
      DB_HOST: db
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-password}
      DB_NAME: ${DB_NAME:-usuarios}
      LANGUAGE: es
      FLASK_ENV: production
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./app-web:/app
    networks:
      - eafit_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Aplicación de Estadísticas
  stats:
    build: ./app-estadisticas
    container_name: eafit_stats
    environment:
      DB_HOST: db
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-password}
      DB_NAME: ${DB_NAME:-usuarios}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      SMTP_SERVER: ${SMTP_SERVER:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      FLASK_ENV: production
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./app-estadisticas:/app
    networks:
      - eafit_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # NGINX - Balanceador de carga
  nginx:
    image: nginx:1.25-alpine
    container_name: eafit_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - web-en
      - web-es
      - stats
    networks:
      - eafit_network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  db_data:
    driver: local

networks:
  eafit_network:
    driver: bridge
