upstream app_en {
    server web-en:5000;
}

upstream app_es {
    server web-es:5000;
}

upstream estadisticas {
    server stats:5001;
}

# Servidor HTTP con balanceo de carga (desarrollo local)
server {
    listen 80;
    server_name _;
    
    # Headers de seguridad
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    
    # Tamaño máximo de cuerpo de solicitud
    client_max_body_size 10M;
    
    # Ruta raíz - redireccionar a la versión en español
    location = / {
        return 301 /es;
    }
    
    # Versión en español
    location /es {
        proxy_pass http://app_es;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Health check
        proxy_connect_timeout 5s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;
    }
    
    # Versión en inglés
    location /en {
        proxy_pass http://app_en;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Health check
        proxy_connect_timeout 5s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;
    }
    
    # API de registros
    location /register {
        proxy_pass http://app_es;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Content-Type application/json;
    }
    
    # Panel de estadísticas
    location /stats {
        proxy_pass http://estadisticas;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # API de estadísticas
    location /api/ {
        proxy_pass http://estadisticas;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Health checks
    location /health/es {
        proxy_pass http://app_es/health;
        proxy_set_header Host $host;
        access_log off;
    }
    
    location /health/en {
        proxy_pass http://app_en/health;
        proxy_set_header Host $host;
        access_log off;
    }
    
    location /health/stats {
        proxy_pass http://estadisticas/health;
        proxy_set_header Host $host;
        access_log off;
    }
}
